name: Build WayLandie Android APK and Runtime

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Sets up standard Android NDK dependencies
      - name: Install Android NDK via SDKManager
        shell: cmd
        run: |
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "ndk;26.1.10909125" "build-tools;36.1.0" "platforms;android-36"

      # Downloads the missing system header and cleans it for standard NDK compilation
      - name: Inject and Patch Missing Android Framework Headers
        shell: pwsh
        run: |
          $nativeDir = "android-app/native"
          $targetHeader = "$nativeDir/android/surface_control_jni.h"
          
          # 1. Force file layout change to C++ 
          if (Test-Path "$nativeDir/waylandie_display_native.c") {
              Rename-Item -Path "$nativeDir/waylandie_display_native.c" -NewName "waylandie_display_native.cpp"
          }
          
          # 2. Re-route the include path locally inside the workspace
          $sourceFile = "$nativeDir/waylandie_display_native.cpp"
          if (Test-Path $sourceFile) {
              (Get-Content $sourceFile) -replace '<android/surface_control_jni.h>', '"android/surface_control_jni.h"' | Set-Content $sourceFile
          }

          # 3. Download the actual surface_control_jni.h from Google Source
          New-Item -ItemType Directory -Force -Path "$nativeDir/android"
          $url = "https://googlesource.com"
          $base64 = Invoke-RestMethod -Uri $url
          $decoded = [System.Text.Encoding]::UTF-8.GetString([System.Convert]::FromBase64String($base64))
          
          # 4. Comment out private symbols that break stand-alone NDK builds
          $cleanedHeader = $decoded -replace '(?s)ASurfaceControl\* ASurfaceControl_createFromWindow.*?\);', '/* Method Removed by Patch */'
          $cleanedHeader | Set-Content $targetHeader
          Write-Host "Successfully injected and prepared missing framework header."

      # Executes the compilation tracking the injected local directories
      - name: Build APK via Patched Compilation
        shell: pwsh
        run: |
          $NDK = "$env:ANDROID_HOME\ndk\26.1.10909125"
          $CLANG = "$NDK\toolchains\llvm\prebuilt\windows-x86_64\bin\aarch64-linux-android31-clang++.cmd"
          
          Write-Host "Compiling native components..."
          & $CLANG -shared -O3 `
            -I"android-app/native" `
            -I"$NDK\sysroot\usr\include" `
            -I"$NDK\sysroot\usr\include\android" `
            "android-app/native/waylandie_display_native.cpp" `
            -o "android-app/native/libwaylandie_display.so" `
            -landroid -llog -lvulkan
            
          if ($LASTEXITCODE -ne 0) { throw "NDK compilation step failed" }
          
          # Re-route your automation builder over the pre-compiled outputs
          $scriptPath = "android-app/tools/build-apk.ps1"
          if (Test-Path $scriptPath) {
              (Get-Content $scriptPath) -replace 'waylandie_display_native\.c', 'waylandie_display_native.cpp' | Set-Content $scriptPath
          }
          
          $env:ANDROID_NDK_HOME = $NDK
          .\android-app\tools\build-apk.ps1 -SdkRoot $env:ANDROID_HOME -NdkRoot $NDK

      # Packages the distribution bundle for Termux / Mobile browsers
      - name: Prepare Runtime Package
        shell: pwsh
        run: |
          Copy-Item -Path "android-app/out/waylandie-display-mvp.apk" -Destination "linux-runtime/" -ErrorAction Ignore
          Compress-Archive -Path "linux-runtime/*" -DestinationPath "waylandie-full-bundle.zip"

      - name: Upload Complete Bundle
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-Full-Distribution
          path: waylandie-full-bundle.zip
