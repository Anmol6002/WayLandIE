name: Build WayLandie Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools and Platform
        shell: cmd
        run: |
          :: Accept SDK licenses automatically and install exact versions required by the script
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "build-tools;36.1.0" "platforms;android-36"

      - name: Build APK using PowerShell script
        shell: pwsh
        run: |
          cd android-app
          # We MUST pass -SdkRoot here because the script defaults to LOCALAPPDATA
          .\tools\build-apk.ps1 -SdkRoot $env:ANDROID_HOME

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-APK
          path: android-app/out/waylandie-display-mvp.apk
