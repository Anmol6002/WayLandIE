name: Build WayLandie Android APK and Runtime

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install NDK along with the Android SDK components
      - name: Install Android NDK via SDKManager
        shell: cmd
        run: |
          echo y| "%ANDROID_HOME%\cmdline-tools\latest\bin\sdkmanager.bat" "ndk;26.1.10909125" "build-tools;36.1.0" "platforms;android-36"

      # Force rename the native source file to C++ so the NDK opens its surface control APIs
      - name: Rename Native Code File
        shell: pwsh
        run: |
          $nativeFile = "android-app/native/waylandie_display_native.c"
          if (Test-Path $nativeFile) {
              Rename-Item -Path $nativeFile -NewName "waylandie_display_native.cpp"
              Write-Host "Renamed native file to .cpp"
          }

      # We override the build script to directly call the toolchain with API level 31 parameters
      - name: Build APK via Overridden Compilation
        shell: pwsh
        run: |
          $NDK = "$env:ANDROID_HOME\ndk\26.1.10909125"
          $CLANG = "$NDK\toolchains\llvm\prebuilt\windows-x86_64\bin\aarch64-linux-android31-clang++.cmd"
          
          # 1. Compile the native object file directly using the aarch64 Android 31 toolchain
          Write-Host "Compiling native components with NDK..."
          & $CLANG -shared -O3 `
            -I"$NDK\sysroot\usr\include" `
            -I"$NDK\sysroot\usr\include\android" `
            "android-app/native/waylandie_display_native.cpp" `
            -o "android-app/native/libwaylandie_display.so" `
            -landroid -llog -lvulkan
            
          if ($LASTEXITCODE -ne 0) { throw "Direct NDK compilation failed" }
          
          # 2. Run your build script (skipping native steps if possible, or letting it package the outputs)
          # We pass -NdkRoot but point it to a safe space, or invoke the build-apk.ps1 wrapper
          $env:ANDROID_NDK_HOME = $NDK
          .\android-app\tools\build-apk.ps1 -SdkRoot $env:ANDROID_HOME -NdkRoot $NDK

      # Automatically packages everything into your mobile distribution bundle
      - name: Prepare Runtime Package
        shell: pwsh
        run: |
          Copy-Item -Path "android-app/out/waylandie-display-mvp.apk" -Destination "linux-runtime/" -ErrorAction Ignore
          Compress-Archive -Path "linux-runtime/*" -DestinationPath "waylandie-full-bundle.zip"

      - name: Upload Complete Bundle
        uses: actions/upload-artifact@v4
        with:
          name: WayLandIE-Full-Distribution
          path: waylandie-full-b
          undle.zip
